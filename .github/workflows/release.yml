name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      BUILD_DIR: build/release
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Validate release tag
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          tag_version="${TAG_NAME#v}"
          project_version="$(sed -nE 's/.*project\(Launcher VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)"
          if [ -z "${project_version}" ] || [ "${tag_version}" != "${project_version}" ]; then
            echo "Tag ${TAG_NAME} does not match CMake project version ${project_version}." >&2
            exit 1
          fi

      - name: Pull pinned public dependencies
        shell: bash
        run: |
          git submodule update --init --depth 1 third_party/imgui
          git -C third_party/imgui submodule update --init --depth 1 third_party/imgui third_party/ImAnim

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B $env:BUILD_DIR `
            -A x64 `
            -DLAUNCHER_STATIC_RUNTIME=ON `
            -DCUSTOM_IMGUI_BUILD_TESTS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release --parallel 2

      - name: Test
        shell: pwsh
        run: ctest --test-dir $env:BUILD_DIR -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $packageName = "launcher-$version-windows-x86_64"
          $releaseDir = Join-Path $env:BUILD_DIR "Release"
          $packageDir = Join-Path "dist" $packageName
          $zipPath = Join-Path "dist" "$packageName.zip"

          Remove-Item "dist" -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item (Join-Path $releaseDir "launcher.exe") $packageDir
          Copy-Item (Join-Path $releaseDir "launcher_updater.exe") $packageDir
          Copy-Item (Join-Path $releaseDir "assets") $packageDir -Recurse
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" $packageDir }
          if (Test-Path "THIRD_PARTY_NOTICES.md") { Copy-Item "THIRD_PARTY_NOTICES.md" $packageDir }

          Compress-Archive -Path $packageDir -DestinationPath $zipPath -CompressionLevel Optimal
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $packageName.zip" | Set-Content "dist/SHA256SUMS.txt" -Encoding ascii

      - name: Generate release notes
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          previous_tag="$(git tag --merged "${GITHUB_SHA}" --sort=-version:refname | grep -Fxv "${TAG_NAME}" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            git log --no-merges --format='- %s' "${previous_tag}..${GITHUB_SHA}" > dist/RELEASE_NOTES.md
          else
            git log --no-merges --format='- %s' "${GITHUB_SHA}" > dist/RELEASE_NOTES.md
          fi
          [ -s dist/RELEASE_NOTES.md ] || echo "- Maintenance release" > dist/RELEASE_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: launcher-${{ github.ref_name }}-windows-x86_64
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
