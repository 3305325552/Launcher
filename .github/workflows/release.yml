name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      BUILD_DIR: build/release
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Validate release tag
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          tag_version="${TAG_NAME#v}"
          project_version="$(sed -nE 's/.*project\(Launcher VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)"
          if [ -z "${project_version}" ] || [ "${tag_version}" != "${project_version}" ]; then
            echo "Tag ${TAG_NAME} does not match CMake project version ${project_version}." >&2
            exit 1
          fi

      - name: Set up MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Pull pinned public dependencies
        shell: msys2 {0}
        run: |
          git submodule update --init --depth 1 third_party/imgui
          git -C third_party/imgui submodule update --init --depth 1 third_party/imgui third_party/ImAnim

      - name: Configure
        shell: msys2 {0}
        run: >-
          cmake -S . -B "${BUILD_DIR}" -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLAUNCHER_STATIC_RUNTIME=OFF
          -DCMAKE_RC_COMPILER=windres
          -DCUSTOM_IMGUI_BUILD_TESTS=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build "${BUILD_DIR}" --parallel 2

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir "${BUILD_DIR}" --output-on-failure

      - name: Package
        shell: msys2 {0}
        run: |
          version="${TAG_NAME#v}"
          package_name="launcher-${version}-windows-x86_64"
          rm -rf dist
          mkdir -p "dist/${package_name}"
          cp "${BUILD_DIR}/launcher.exe" "dist/${package_name}/"
          cp "${BUILD_DIR}/launcher_updater.exe" "dist/${package_name}/"
          cp /mingw64/bin/libgcc_s_seh-1.dll "dist/${package_name}/"
          cp /mingw64/bin/libstdc++-6.dll "dist/${package_name}/"
          cp /mingw64/bin/libwinpthread-1.dll "dist/${package_name}/"
          cp -r "${BUILD_DIR}/assets" "dist/${package_name}/assets"
          [ ! -f LICENSE ] || cp LICENSE "dist/${package_name}/"
          [ ! -f THIRD_PARTY_NOTICES.md ] || cp THIRD_PARTY_NOTICES.md "dist/${package_name}/"
          (cd dist && zip -r "${package_name}.zip" "${package_name}")
          (cd dist && sha256sum "${package_name}.zip" > SHA256SUMS.txt)

      - name: Generate release notes
        if: github.event_name != 'workflow_dispatch'
        shell: msys2 {0}
        run: |
          previous_tag="$(git tag --merged "${GITHUB_SHA}" --sort=-version:refname | grep -Fxv "${TAG_NAME}" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            git log --no-merges --format='- %s' "${previous_tag}..${GITHUB_SHA}" > dist/RELEASE_NOTES.md
          else
            git log --no-merges --format='- %s' "${GITHUB_SHA}" > dist/RELEASE_NOTES.md
          fi
          [ -s dist/RELEASE_NOTES.md ] || echo "- Maintenance release" > dist/RELEASE_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: launcher-${{ github.ref_name }}-windows-x86_64
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
