name: Quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Pull pinned public dependencies
        shell: bash
        run: |
          git submodule update --init --depth 1 third_party/imgui
          git -C third_party/imgui submodule update --init --depth 1 third_party/imgui third_party/ImAnim

      - name: Set up MSYS2 Clang
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            mingw-w64-clang-x86_64-toolchain
            mingw-w64-clang-x86_64-clang-tools-extra
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja

      - name: Check formatting
        shell: msys2 {0}
        run: |
          mapfile -d '' files < <(find src include tests -type f \( -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print0)
          clang-format --dry-run --Werror "${files[@]}"

      - name: Configure
        shell: msys2 {0}
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_RC_COMPILER=windres
          -DCUSTOM_IMGUI_BUILD_TESTS=OFF

      - name: Check clangd diagnostics
        shell: msys2 {0}
        run: |
          while IFS= read -r file; do
            clangd --check="$file" --compile-commands-dir=build/ci --enable-config --tweaks=
          done < <(find src tests -type f -name '*.cpp' -print)

      - name: Build
        shell: msys2 {0}
        run: cmake --build build/ci --parallel 2

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build/ci --output-on-failure

  msvc-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Pull pinned public dependencies
        shell: bash
        run: |
          git submodule update --init --depth 1 third_party/imgui
          git -C third_party/imgui submodule update --init --depth 1 third_party/imgui third_party/ImAnim

      - name: Configure MSVC
        shell: pwsh
        run: |
          cmake -S . -B build/msvc `
            -A x64 `
            -DLAUNCHER_STATIC_RUNTIME=ON `
            -DCUSTOM_IMGUI_BUILD_TESTS=OFF

      - name: Build MSVC
        shell: pwsh
        run: cmake --build build/msvc --config Release --parallel 2

      - name: Test MSVC
        shell: pwsh
        run: ctest --test-dir build/msvc -C Release --output-on-failure
